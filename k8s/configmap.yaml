apiVersion: v1
kind: ConfigMap
metadata:
  name: delectable-config
  namespace: delectable
data:
  DJANGO_SETTINGS_MODULE: "config.settings.production"
  ALLOWED_HOSTS: "delectable.app,*.delectable.app"
  CORS_ALLOWED_ORIGINS: "https://delectable.app"
  NEXT_PUBLIC_API_URL: "https://api.delectable.app"
