name: Deploy to Production

on:
  release:
    types: [published]

permissions:
  id-token: write
  contents: read
  deployments: write

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com
  FRONTEND_IMAGE: delectable-frontend
  BACKEND_IMAGE: delectable-backend
  NODE_VERSION: '22'
  RUBY_VERSION: '3.3'

jobs:
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Get release tag
        id: release
        run: echo "tag=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.frontend
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.FRONTEND_IMAGE }}:${{ steps.release.outputs.tag }}
            ${{ env.ECR_REGISTRY }}/${{ env.FRONTEND_IMAGE }}:production
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.PRODUCTION_API_URL }}
            NEXT_PUBLIC_GOOGLE_MAPS_API_KEY=${{ secrets.GOOGLE_MAPS_API_KEY }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.backend
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.BACKEND_IMAGE }}:${{ steps.release.outputs.tag }}
            ${{ env.ECR_REGISTRY }}/${{ env.BACKEND_IMAGE }}:production

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name delectable-production --region ${{ env.AWS_REGION }}

      - name: Pre-deployment backup
        run: |
          # Create database backup before deployment
          kubectl exec -n delectable deploy/backend -- python manage.py dbbackup --compress

      - name: Run migrations
        run: |
          kubectl exec -n delectable deploy/backend -- python manage.py migrate --noinput

      - name: Deploy to Kubernetes
        run: |
          # Update image tags
          kubectl set image deployment/frontend frontend=${{ env.ECR_REGISTRY }}/${{ env.FRONTEND_IMAGE }}:${{ steps.release.outputs.tag }} -n delectable
          kubectl set image deployment/backend backend=${{ env.ECR_REGISTRY }}/${{ env.BACKEND_IMAGE }}:${{ steps.release.outputs.tag }} -n delectable

          # Wait for rollout
          kubectl rollout status deployment/frontend -n delectable --timeout=300s
          kubectl rollout status deployment/backend -n delectable --timeout=300s

      - name: Collect static files
        run: |
          kubectl exec -n delectable deploy/backend -- python manage.py collectstatic --noinput

      - name: Clear cache
        run: |
          kubectl exec -n delectable deploy/backend -- python manage.py clearcache

      - name: Smoke test
        run: |
          # Wait for services to stabilize
          sleep 30
          # Health check
          curl --fail https://api.delectable.app/api/health/ || exit 1
          curl --fail https://delectable.app || exit 1

      - name: Create GitHub deployment
        uses: chrnorm/deployment-action@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          environment: production
          ref: ${{ github.event.release.tag_name }}

      - name: Notify success
        if: success()
        run: |
          echo "Production deployment successful!"
          echo "Release: ${{ steps.release.outputs.tag }}"

      - name: Rollback on failure
        if: failure()
        run: |
          echo "Deployment failed! Rolling back..."
          kubectl rollout undo deployment/frontend -n delectable
          kubectl rollout undo deployment/backend -n delectable

  # iOS TestFlight build triggered on release
  ios-testflight:
    name: iOS TestFlight Build
    runs-on: macos-15
    timeout-minutes: 60
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci

      - name: Build Next.js static export
        run: CAPACITOR_BUILD=true npx next build
        env:
          NEXT_PUBLIC_API_URL: ${{ vars.PRODUCTION_API_URL }}
          NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ vars.FIREBASE_AUTH_DOMAIN }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ vars.FIREBASE_PROJECT_ID }}
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ vars.FIREBASE_MESSAGING_SENDER_ID }}
          NEXT_PUBLIC_FIREBASE_APP_ID: ${{ vars.FIREBASE_APP_ID }}
          NEXT_PUBLIC_FIREBASE_VAPID_KEY: ${{ secrets.FIREBASE_VAPID_KEY }}

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ env.RUBY_VERSION }}
          bundler-cache: true
          working-directory: ios

      - name: Install CocoaPods
        run: |
          cd ios/App
          pod install

      - name: Build and upload to TestFlight
        run: |
          cd ios
          bundle exec fastlane beta
        env:
          APPLE_KEY_ID: ${{ secrets.APPLE_KEY_ID }}
          APPLE_ISSUER_ID: ${{ secrets.APPLE_ISSUER_ID }}
          APPLE_KEY_CONTENT: ${{ secrets.APPLE_KEY_CONTENT }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}

      - name: Upload build artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-release-${{ github.event.release.tag_name }}
          path: |
            build/*.ipa
          retention-days: 30

      - name: Notify iOS build result
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "iOS TestFlight build uploaded successfully for release ${{ github.event.release.tag_name }}"
          else
            echo "iOS TestFlight build failed for release ${{ github.event.release.tag_name }}"
          fi
